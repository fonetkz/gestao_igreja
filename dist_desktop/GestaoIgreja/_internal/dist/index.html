<script>
    try {
      // Limpa sessão de login ao iniciar (para exe standalone)
      localStorage.removeItem('gestao_igreja_token');
      localStorage.removeItem('gestao_igreja_user');

      // Força modo claro por padrão
      const savedTheme = localStorage.getItem('gestao_igreja_theme');
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        localStorage.setItem('gestao_igreja_theme', 'light');
        document.documentElement.classList.remove('dark');
      }
    } catch (e) { }
  </script>
